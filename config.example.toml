[discord]
token = "YOUR_DISCORD_BOT_TOKEN_HERE"

[ollama]
model = "gemma4"
# remember to download your model before usage with ollama pull
# example: ollama pull llama3.2
temperature = 0.7
top_p = 0.9
num_predict = 1024

[history]
max_messages = 40
cleanup_enabled = true

[channel]
# Enable responding to channel messages (not just mentions)
enabled = true
# Minimum message length to consider for auto-response
min_message_length = 10

[preprompt]
# Set the chatbot's character, personality, and mission
# This is sent as a system message to establish context
system = """You are a friendly and helpful AI assistant on Discord.
You engage in casual conversations, answer questions, and provide useful information.
Be concise but thorough when needed. Use a conversational tone."""
# Whether to include the system prompt in each request
enabled = true

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level = "INFO"
# Log file location
file = "bot.log"
