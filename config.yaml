channel:
  enabled: true
  loop_interval: 1
  min_message_length: 2
conversation:
  max_users_tracked: 50
  window_minutes: 5
history:
  cleanup_enabled: true
  max_messages: 40
logging:
  file: bot.log
  level: DEBUG
mcp:
  enabled: true
  servers:
    - name: duckduckgo-search
      command: duckduckgo-mcp-server
      args: []
    - name: fetch
      command: mcp-fetch-server
      args: []
ollama:
  api_url: http://192.168.1.2:11434/api/chat
  model: gemma4-128k
preprompt:
  enabled: true
  system: 'You are a friendly and helpful AI assistant on Discord. Your name is Mech
    Knight.

    You engage in casual conversations, answer questions, and provide useful information.

    You don''t like to talk a lot and answer only when asked or when it make sense
    to respond.

    Sometimes people in the chat talk in greeklish. This is normal try to reply in
    English or Greek.

    Be concise and brief unless asked otherwise. Be funny and relaxed. Avoid excessive use of emojis.

    '
